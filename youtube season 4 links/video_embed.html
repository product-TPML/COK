<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Season 4 — Complete Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #131110;
      --surface: #1E1B18;
      --surface-hover: #2A2622;
      --border: #332F2A;
      --border-hover: #4A453E;
      --text: #F0EDE8;
      --text-muted: #7A756E;
      --accent: #F5C518;
      --accent-secondary: #D4542E;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
      --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      --radius: 16px;
    }

    /* Site Header */
    .site-header {
      font-family: 'Sora', sans-serif;
      position: relative;
      z-index: 50;
    }

    /* Top red bar (75px) */
    .header-top {
      background: #A5161C;
      height: 75px;
      position: relative;
    }

    .header-top-inner {
      max-width: 1440px;
      margin: 0 auto;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      position: relative;
    }

    .header-top-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 2px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .logo img {
      height: 62px;
      width: auto;
      display: block;
    }

    .mobile-menu-btn {
      display: none;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 0.25rem;
    }

    .mobile-menu-btn svg {
      width: 24px;
      height: 24px;
    }

    .header-top-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .desktop-menu-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 0.25rem;
    }

    .desktop-menu-btn svg {
      width: 24px;
      height: 24px;
    }

    /* Bottom strip (42px) */
    .header-strip {
      background: #000;
      height: 42px;
      position: relative;
      display: none;
    }

    .header-strip::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.04);
      pointer-events: none;
    }

    .strip-inner {
      max-width: 1440px;
      margin: 0 auto;
      height: 100%;
      position: relative;
    }

    .strip-divider {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255,255,255,0.5);
    }

    .strip-nav {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      height: 100%;
      position: relative;
      z-index: 2;
    }

    .strip-nav a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #fff;
      text-decoration: none;
      font-family: 'Sora', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      height: 100%;
      transition: background 0.2s ease;
    }

    .strip-nav a:hover {
      background: rgba(255,255,255,0.08);
    }

    .strip-nav a.active {
      background: rgba(255,255,255,0.12);
      position: relative;
    }

    .strip-nav a.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 3px;
      background: #fff;
      border-radius: 3px 3px 0 0;
    }

    /* Mobile nav overlay */
    .mobile-nav {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .mobile-nav.open {
      opacity: 1;
      visibility: visible;
    }

    .mobile-nav-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 280px;
      max-width: 80vw;
      height: 100%;
      background: #A5161C;
      padding: 1.5rem;
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }

    .mobile-nav.open .mobile-nav-panel {
      transform: translateX(0);
    }

    .mobile-nav-close {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 0.25rem;
      margin-bottom: 1.5rem;
      display: flex;
    }

    .mobile-nav-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .mobile-nav-links a {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    .mobile-nav-links a svg {
      flex-shrink: 0;
    }

    /* Desktop */
    @media (min-width: 768px) {
      .header-top-inner {
        padding: 0 2rem;
      }

      .logo img {
        height: 58px;
      }

      .header-strip {
        display: block;
      }
    }

    @media (min-width: 1024px) {
      .header-top-inner {
        padding: 0 3rem;
      }

      .logo img {
        height: 64px;
      }
    }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      scrollbar-width: thin;
      scrollbar-color: #332F2A transparent;
    }

    body::-webkit-scrollbar {
      width: 8px;
    }

    body::-webkit-scrollbar-track {
      background: transparent;
    }

    body::-webkit-scrollbar-thumb {
      background: #332F2A;
      border-radius: 4px;
    }

    body::-webkit-scrollbar-thumb:hover {
      background: #4A453E;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Sora', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      padding: 0 1rem 0.25rem;
    }

    @media (min-width: 640px) {
      .page-title {
        justify-content: center;
        font-size: 2rem;
        text-align: center;
        padding: 0 0 0.25rem;
      }
    }

    .season-tabs {
      display: flex;
      justify-content: flex-start;
      gap: 0.375rem;
      margin-bottom: 2.5rem;
      padding: 0 1rem;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    @media (min-width: 640px) {
      .season-tabs {
        justify-content: center;
        padding: 0;
      }
    }

    .season-tabs::-webkit-scrollbar {
      display: none;
    }

    .season-tab {
      font-family: 'Sora', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .season-tab:hover {
      color: var(--text);
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }

    .season-tab.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .grid.switching {
      opacity: 0;
      transform: translateY(12px);
    }

    @media (min-width: 640px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1.5rem;
      }
      .container {
        padding: 2.5rem 1.5rem 4rem;
      }
    }

    @media (min-width: 1024px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1.75rem;
      }
      .container {
        padding: 3rem 2rem 5rem;
      }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      box-shadow: var(--shadow);
      animation: cardIn 0.45s ease backwards;
      animation-delay: calc(var(--i, 0) * 45ms);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--border-hover);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
    }

    .poster {
      position: absolute;
      inset: 0;
      cursor: pointer;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease, filter 0.4s ease;
    }

    .card:hover .poster img {
      transform: scale(1.05);
      filter: brightness(1.1);
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.2);
      transition: background 0.3s ease;
    }

    .poster:hover .play-overlay {
      background: rgba(0, 0, 0, 0.35);
    }

    .play-btn {
      width: 64px;
      height: 64px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      transition: transform 0.3s ease, background 0.3s ease;
      backdrop-filter: blur(4px);
    }

    .poster:hover .play-btn {
      transform: scale(1.1);
      background: #fff;
    }

    .play-btn svg {
      width: 24px;
      height: 24px;
      fill: var(--accent-secondary);
      margin-left: 3px;
    }

    .player {
      position: absolute;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .player iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .card.active .poster {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .card.active .player {
      opacity: 1;
      visibility: visible;
    }

    .card-info {
      padding: 1rem 1.25rem 1.25rem;
    }

    .episode-label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Sora', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 0.375rem;
    }

    .episode-label::before {
      content: '';
      display: block;
      width: 8px;
      height: 8px;
      background: var(--accent-secondary);
      border-radius: 2px;
    }

    .episode-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.125rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
    }

    .loading-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.5);
      padding: 4px 12px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .poster:hover .loading-hint {
      opacity: 1;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    @keyframes card-highlight {
      0%, 75% { box-shadow: 0 0 0 3px var(--accent), var(--shadow-hover); border-color: var(--accent); }
      100% { box-shadow: 0 0 0 3px transparent, var(--shadow); border-color: transparent; }
    }

    .card.highlight {
      animation: card-highlight 6.5s ease-out forwards;
    }



    .jump-fab {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-secondary);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(212, 84, 46, 0.4);
      z-index: 100;
      transition: all 0.2s ease;
    }

    .jump-fab:hover {
      background: #e8633a;
      box-shadow: 0 6px 24px rgba(212, 84, 46, 0.55);
      transform: scale(1.12);
    }

    .jump-fab svg {
      stroke: #fff;
    }

    .jump-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 101;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }

    .jump-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .jump-panel {
      position: fixed;
      bottom: 5rem;
      right: 1.5rem;
      width: 320px;
      max-width: calc(100vw - 2rem);
      max-height: calc(100vh - 7rem);
      background: var(--surface);
      border: 1px solid var(--accent-secondary);
      border-radius: var(--radius);
      z-index: 102;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(212, 84, 46, 0.15);
      opacity: 0;
      visibility: hidden;
      transform: translateY(12px) scale(0.96);
      transition: opacity 0.25s ease, visibility 0.25s ease, transform 0.25s ease;
    }

    .jump-panel.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    .jump-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(212,84,46,0.08) 0%, transparent 60%);
    }

    .jump-panel-header h3 {
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .jump-panel-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }

    .jump-panel-close:hover {
      color: var(--accent-secondary);
    }

    .jump-search {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .jump-search input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 2rem 0.5rem 0.75rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease;
    }

    .jump-search input:focus {
      border-color: var(--accent-secondary);
      box-shadow: 0 0 0 3px rgba(212, 84, 46, 0.15);
    }

    .jump-search input::placeholder {
      color: var(--text-muted);
    }

    .jump-search-icon {
      flex-shrink: 0;
      color: var(--text-muted);
      display: flex;
    }

    .jump-search-clear {
      position: absolute;
      right: 1.6rem;
      top: 50%;
      transform: translateY(-62%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.125rem;
      display: none;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }

    .jump-search-clear.visible {
      display: flex;
    }

    .jump-search-clear:hover {
      color: var(--text);
    }

    .jump-panel-body {
      overflow-y: auto;
      padding: 0.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .jump-panel-body::-webkit-scrollbar {
      width: 6px;
    }

    .jump-panel-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .jump-season-group {
      margin-bottom: 0.5rem;
    }

    .jump-season-label {
      font-family: 'Sora', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.25rem;
    }

    .jump-episode {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .jump-episode:hover {
      background: var(--surface-hover);
      outline: 1px solid rgba(212, 84, 46, 0.2);
    }

    .jump-episode-num {
      font-family: 'Sora', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent-secondary);
      min-width: 1.5rem;
      margin-top: 0.125rem;
    }

    .jump-episode-title {
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.4;
    }

    /* Mobile bottom nav */
    .bottom-nav {
      display: none;
    }

    @media (max-width: 767px) {
      body {
        padding-bottom: 64px;
      }

      .jump-fab {
        bottom: calc(1.5rem + 72px);
      }

      .bottom-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 64px;
        background: linear-gradient(180deg, #A5161C 0%, #8C1217 100%);
        z-index: 90;
        box-shadow: 0 -3px 12px rgba(0,0,0,0.3);
      }

      .bottom-nav-inner {
        display: flex;
        align-items: center;
        justify-content: space-around;
        width: 100%;
        max-width: 1440px;
        margin: 0 auto;
        height: 100%;
        padding: 0 0.5rem;
      }

      .bottom-nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        color: rgba(255,255,255,0.85);
        text-decoration: none;
        font-family: 'Sora', sans-serif;
        font-size: 0.5rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        flex: 1;
        height: 100%;
        position: relative;
        transition: color 0.2s ease;
      }

      .bottom-nav-item svg {
        width: 20px;
        height: 20px;
        opacity: 0.8;
        transition: opacity 0.2s ease;
      }

      .bottom-nav-item.active,
      .bottom-nav-item:active {
        color: #fff;
      }

      .bottom-nav-item.active svg,
      .bottom-nav-item:active svg {
        opacity: 1;
      }

      .bottom-nav-item.active::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 40%;
        height: 3px;
        background: #fff;
        border-radius: 3px 3px 0 0;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-top">
      <div class="header-top-inner">
        <div class="header-top-left">
          <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <a href="#" class="logo">
            <img src="logo.jpg" alt="COK — Cooking with Kannadigas">
          </a>
        </div>
        <div class="header-top-right">
          <button class="desktop-menu-btn" id="desktop-menu-btn" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="header-strip">
      <div class="strip-inner">
        <div class="strip-divider" style="left:20%"></div>

      const card = document.createElement('article');

      const playlistIndex = index + 1;
      const embedUrl = `https://www.youtube.com/embed/${video.id}?autoplay=1&list=${season.playlist}&index=${playlistIndex}`;

      `;

        iframe.setAttribute('allowfullscreen', '');

        playerContainer.appendChild(iframe);
      });

      return card;
    }

      grid.classList.add('switching');

      setTimeout(() => {
        grid.innerHTML = '';
        season.videos.forEach((video, i) => {

      jumpEpisodeItems = [];
      seasons.forEach(season => {
        const group = document.createElement('div');
        group.className = 'jump-season-group';

        const label = document.createElement('div');
        label.className = 'jump-season-label';
        label.textContent = `Season ${season.number}`;
        group.appendChild(label);

        season.videos.forEach((video, idx) => {
          const item = document.createElement('div');
          item.className = 'jump-episode';
          item.dataset.title = video.title.toLowerCase();
          item.innerHTML = `
            <span class="jump-episode-num">${video.episode}</span>
            <span class="jump-episode-title">${video.title}</span>
          `;
          item.addEventListener('click', () => {
            closeJumpPanel();
            const seasonIdx = seasons.indexOf(season);
            if (seasonIdx !== currentSeason) {
              currentSeason = seasonIdx;
              renderSeason(seasonIdx, () => {
                const card = grid.children[idx];
                if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'start' }); highlightCard(card); }
              });
            } else {
              const card = grid.children[idx];
              if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'start' }); highlightCard(card); }
            }
          });
          group.appendChild(item);
          jumpEpisodeItems.push({ item, group });
        });

        jumpPanelBody.appendChild(group);
      });
    }

    function filterJumpPanel(query) {
      const q = query.trim().toLowerCase();
      jumpSearchClear.classList.toggle('visible', q.length > 0);

      jumpEpisodeItems.forEach(({ item, group }) => {
        const matches = !q || item.dataset.title.includes(q);
        item.style.display = matches ? '' : 'none';
      });

      jumpPanelBody.querySelectorAll('.jump-season-group').forEach(group => {
        const visible = group.querySelectorAll('.jump-episode:not([style*="display: none"])').length > 0;
        group.style.display = visible ? '' : 'none';
      });
    }

    function openJumpPanel() {
      jumpOverlay.classList.add('open');
      jumpPanel.classList.add('open');
      jumpSearchInput.focus();
    }

    function closeJumpPanel() {
      jumpOverlay.classList.remove('open');
      jumpPanel.classList.remove('open');
      jumpSearchInput.value = '';
      filterJumpPanel('');
    }

    jumpFab.addEventListener('click', openJumpPanel);
    jumpClose.addEventListener('click', closeJumpPanel);
    jumpOverlay.addEventListener('click', closeJumpPanel);
    jumpSearchInput.addEventListener('input', (e) => filterJumpPanel(e.target.value));
    jumpSearchClear.addEventListener('click', () => {
      jumpSearchInput.value = '';
      filterJumpPanel('');
      jumpSearchInput.focus();
    });

    buildJumpPanel();

    /* Mobile header nav */
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');
    const desktopMenuBtn = document.getElementById('desktop-menu-btn');
    const mobileNav = document.getElementById('mobile-nav');
    const mobileNavClose = document.getElementById('mobile-nav-close');

    function openMobileNav() { mobileNav.classList.add('open'); }
    function closeMobileNav() { mobileNav.classList.remove('open'); }

    if (mobileNav && mobileNavClose) {
      mobileNavClose.addEventListener('click', closeMobileNav);
      mobileNav.addEventListener('click', (e) => {
        if (e.target === mobileNav) closeMobileNav();
      });
    }
    if (mobileMenuBtn) mobileMenuBtn.addEventListener('click', openMobileNav);
    if (desktopMenuBtn) desktopMenuBtn.addEventListener('click', openMobileNav);
  </script>
</body>
</html>
