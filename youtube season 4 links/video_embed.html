<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #131110;
      --surface: #1E1B18;
      --surface-hover: #2A2622;
      --border: #332F2A;
      --border-hover: #4A453E;
      --text: #F0EDE8;
      --text-muted: #7A756E;
      --accent: #F5C518;
      --accent-secondary: #D4542E;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
      --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    .season-tabs {
      display: flex;
      justify-content: flex-start;
      gap: 0.375rem;
      margin-bottom: 2.5rem;
      padding: 0 1rem;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    @media (min-width: 640px) {
      .season-tabs {
        justify-content: center;
        padding: 0;
      }
    }

    .season-tabs::-webkit-scrollbar {
      display: none;
    }

    .season-tab {
      font-family: 'Sora', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .season-tab:hover {
      color: var(--text);
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }

    .season-tab.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .grid.switching {
      opacity: 0;
      transform: translateY(12px);
    }

    @media (min-width: 640px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1.5rem;
      }
      .container {
        padding: 2.5rem 1.5rem 4rem;
      }
    }

    @media (min-width: 1024px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 1.75rem;
      }
      .container {
        padding: 3rem 2rem 5rem;
      }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      box-shadow: var(--shadow);
      animation: cardIn 0.45s ease backwards;
      animation-delay: calc(var(--i, 0) * 45ms);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--border-hover);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
    }

    .poster {
      position: absolute;
      inset: 0;
      cursor: pointer;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease, filter 0.4s ease;
    }

    .card:hover .poster img {
      transform: scale(1.05);
      filter: brightness(1.1);
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.2);
      transition: background 0.3s ease;
    }

    .poster:hover .play-overlay {
      background: rgba(0, 0, 0, 0.35);
    }

    .play-btn {
      width: 64px;
      height: 64px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      transition: transform 0.3s ease, background 0.3s ease;
      backdrop-filter: blur(4px);
    }

    .poster:hover .play-btn {
      transform: scale(1.1);
      background: #fff;
    }

    .play-btn svg {
      width: 24px;
      height: 24px;
      fill: var(--accent-secondary);
      margin-left: 3px;
    }

    .player {
      position: absolute;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .player iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .card.active .poster {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .card.active .player {
      opacity: 1;
      visibility: visible;
    }

    .card-info {
      padding: 1rem 1.25rem 1.25rem;
    }

    .episode-label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Sora', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 0.375rem;
    }

    .episode-label::before {
      content: '';
      display: block;
      width: 8px;
      height: 8px;
      background: var(--accent-secondary);
      border-radius: 2px;
    }

    .episode-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.125rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
    }

    .loading-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.5);
      padding: 4px 12px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .poster:hover .loading-hint {
      opacity: 1;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    @keyframes card-highlight {
      0%, 75% { box-shadow: 0 0 0 3px var(--accent), var(--shadow-hover); border-color: var(--accent); }
      100% { box-shadow: 0 0 0 3px transparent, var(--shadow); border-color: transparent; }
    }

    .card.highlight {
      animation: card-highlight 6.5s ease-out forwards;
    }



    .jump-fab {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-hover);
      z-index: 100;
      transition: all 0.2s ease;
      opacity: 0.7;
    }

    .jump-fab:hover {
      opacity: 1;
      background: var(--surface-hover);
      border-color: var(--border-hover);
      transform: scale(1.05);
    }

    .jump-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 101;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }

    .jump-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .jump-panel {
      position: fixed;
      bottom: 5rem;
      right: 1.5rem;
      width: 320px;
      max-width: calc(100vw - 2rem);
      max-height: calc(100vh - 7rem);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      z-index: 102;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-hover);
      opacity: 0;
      visibility: hidden;
      transform: translateY(12px) scale(0.96);
      transition: opacity 0.25s ease, visibility 0.25s ease, transform 0.25s ease;
    }

    .jump-panel.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    .jump-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .jump-panel-header h3 {
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .jump-panel-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }

    .jump-panel-close:hover {
      color: var(--text);
    }

    .jump-panel-body {
      overflow-y: auto;
      padding: 0.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .jump-panel-body::-webkit-scrollbar {
      width: 6px;
    }

    .jump-panel-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .jump-season-group {
      margin-bottom: 0.5rem;
    }

    .jump-season-label {
      font-family: 'Sora', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.25rem;
    }

    .jump-episode {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .jump-episode:hover {
      background: var(--surface-hover);
    }

    .jump-episode-num {
      font-family: 'Sora', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent-secondary);
      min-width: 1.5rem;
      margin-top: 0.125rem;
    }

    .jump-episode-title {
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.4;
    }
  </style>
</head>

        ]

    const grid = document.getElementById('video-grid');
    const tabsContainer = document.getElementById('season-tabs');
    const footerText = document.querySelector('footer p');

    let currentSeason = 0;

    function buildCard(video, index, season) {
      const card = document.createElement('article');
      card.className = 'card';
      card.style.setProperty('--i', index);

      const playlistIndex = index + 1;
      const embedUrl = `https://www.youtube.com/embed/${video.id}?autoplay=1&list=${season.playlist}&index=${playlistIndex}`;
      const thumbUrl = `https://img.youtube.com/vi/${video.id}/hqdefault.jpg`;

      card.innerHTML = `
        <div class="video-wrapper">
          <div class="poster" role="button" aria-label="Play Episode ${video.episode}">
            <img src="${thumbUrl}" alt="Episode ${video.episode} thumbnail" loading="lazy">
            <div class="play-overlay">
              <div class="play-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M8 5v14l11-7z"/>
                </svg>
              </div>
            </div>
            <span class="loading-hint">Click to load video</span>
          </div>
          <div class="player"></div>
        </div>
        <div class="card-info">
          <div class="episode-label">Episode ${video.episode}</div>
          <div class="episode-title">${video.title}</div>
        </div>
      `;

      const poster = card.querySelector('.poster');
      const playerContainer = card.querySelector('.player');

      poster.addEventListener('click', () => {
        if (card.classList.contains('active')) return;
        card.classList.add('active');

        const iframe = document.createElement('iframe');
        iframe.setAttribute('src', embedUrl);
        iframe.setAttribute('title', `YouTube video player - Episode ${video.episode}`);
        iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
        iframe.setAttribute('allowfullscreen', '');

        playerContainer.appendChild(iframe);
      });

      return card;
    }

    function renderSeason(index, onDone) {
      const season = seasons[index];

      document.title = `Season ${season.number} — Complete Collection`;
      footerText.textContent = `Playlist: ${season.playlist}`;

      tabsContainer.querySelectorAll('.season-tab').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
      });

      grid.classList.add('switching');

      setTimeout(() => {
        grid.innerHTML = '';
        season.videos.forEach((video, i) => {
          grid.appendChild(buildCard(video, i, season));
        });
        grid.classList.remove('switching');
        if (onDone) onDone();
      }, 220);
    }

    seasons.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'season-tab';
      btn.textContent = `Season ${s.number}`;
      btn.addEventListener('click', () => {
        if (i === currentSeason) return;
        currentSeason = i;
        renderSeason(i);
      });
      tabsContainer.appendChild(btn);
    });

    renderSeason(0);

    const jumpFab = document.getElementById('jump-fab');
    const jumpOverlay = document.getElementById('jump-overlay');
    const jumpPanel = document.getElementById('jump-panel');
    const jumpClose = document.getElementById('jump-close');
    const jumpPanelBody = document.getElementById('jump-panel-body');

    function highlightCard(card) {
      if (!card) return;
      card.classList.remove('highlight');
      void card.offsetWidth;
      card.classList.add('highlight');
    }

    function buildJumpPanel() {
      jumpPanelBody.innerHTML = '';
      seasons.forEach(season => {
        const group = document.createElement('div');
        group.className = 'jump-season-group';

        const label = document.createElement('div');
        label.className = 'jump-season-label';
        label.textContent = `Season ${season.number}`;
        group.appendChild(label);

        season.videos.forEach((video, idx) => {
          const item = document.createElement('div');
          item.className = 'jump-episode';
          item.innerHTML = `
            <span class="jump-episode-num">${video.episode}</span>
            <span class="jump-episode-title">${video.title}</span>
          `;
          item.addEventListener('click', () => {
            closeJumpPanel();
            const seasonIdx = seasons.indexOf(season);
            if (seasonIdx !== currentSeason) {
              currentSeason = seasonIdx;
              renderSeason(seasonIdx, () => {
                const card = grid.children[idx];
                if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'start' }); highlightCard(card); }
              });
            } else {
              const card = grid.children[idx];
              if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'start' }); highlightCard(card); }
            }
          });
          group.appendChild(item);
        });

        jumpPanelBody.appendChild(group);
      });
    }

    function openJumpPanel() {
      jumpOverlay.classList.add('open');
      jumpPanel.classList.add('open');
    }

    function closeJumpPanel() {
      jumpOverlay.classList.remove('open');
      jumpPanel.classList.remove('open');
    }

    jumpFab.addEventListener('click', openJumpPanel);
    jumpClose.addEventListener('click', closeJumpPanel);
    jumpOverlay.addEventListener('click', closeJumpPanel);

    buildJumpPanel();
  </script>
</body>
</html>
